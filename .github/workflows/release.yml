name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - run: test "v$(node -p 'require("./package.json").version')" = "$GITHUB_REF_NAME"
      - run: bun install --frozen-lockfile
      - name: Install Chromium when required
        run: |
          if node -e 'const p=require("./package.json"); process.exit(p.devDependencies?.playwright ? 0 : 1)'; then
            bunx playwright install --with-deps chromium
          fi
      - run: bun run --if-present lint
      - run: bun run build
      - run: bun run --if-present test
      - name: Publish packed artifact
        run: |
          if [ -n "$NPM_TOKEN" ]; then
            npm config set //registry.npmjs.org/:_authToken "$NPM_TOKEN"
          fi
          pack_dir="$RUNNER_TEMP/npm-pack"
          mkdir -p "$pack_dir"
          npm pack --pack-destination "$pack_dir"
          tarball="$(find "$pack_dir" -maxdepth 1 -type f -name '*.tgz' -print -quit)"
          test -n "$tarball"
          npm publish "$tarball" --provenance --access public
        env:
          # Bootstrap only: add a granular NPM_TOKEN for a new package, then
          # configure this repository as its trusted publisher and delete it.
          NPM_TOKEN: "${{ secrets.NPM_TOKEN }}"
