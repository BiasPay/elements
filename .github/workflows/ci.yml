name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14
      - run: bun install --frozen-lockfile
      - name: Install Chromium when required
        run: |
          if node -e 'const p=require("./package.json"); process.exit(p.devDependencies?.playwright ? 0 : 1)'; then
            bunx playwright install --with-deps chromium
          fi
      - run: bun run --if-present lint
      - run: bun run build
      - run: bun run --if-present test
      - run: bun pm pack --destination "${{ runner.temp }}"
